# WIPO 商标排查工具 — 账号配置模板
#
# 使用方法：
# 1. 复制此文件为 secrets.toml（放在同一目录 .streamlit/ 下）
# 2. 修改下面的用户名、密码、密钥
# 3. Streamlit Cloud 部署时：Settings → Secrets → 粘贴此内容
#
# 注意：secrets.toml 不会上传到 GitHub（已在 .gitignore 中排除）

# --- 用户账号（用户名 = 密码）---
# 添加用户：新增一行 "用户名" = "密码"
# 删除用户：删掉对应行
# 改密码：修改对应值
[users]
"zhangsan" = "change-me-001"
"lisi" = "change-me-002"

# --- Token 签名密钥 ---
# 用于生成登录凭证，请改成一个随机字符串（至少20个字符）
# 可用 Python 生成：python -c "import secrets; print(secrets.token_hex(16))"
auth_secret = "change-this-to-a-random-secret-key"
